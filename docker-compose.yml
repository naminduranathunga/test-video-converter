version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - video-net
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    networks:
      - video-net

  createbuckets:
    image: minio/mc
    container_name: minio_mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin) do echo '...waiting for minio...' && sleep 1; done;
      /usr/bin/mc mb --ignore-existing local/videos;
      /usr/bin/mc anonymous set public local/videos;
      exit 0;
      "
    networks:
      - video-net

  api:
    build: ./service1
    container_name: video_api
    env_file:
      - ./service1/.env
    ports:
      - '3001:3001'
    depends_on:
      - rabbitmq
      - minio
    networks:
      - video-net

  worker:
    build: ./service2
    container_name: video_worker
    env_file:
      - ./service2/.env
    depends_on:
      - rabbitmq
      - minio
    networks:
      - video-net

  frontend:
    image: nginx:alpine
    container_name: video_frontend
    ports:
      - '8080:80'
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - video-net

networks:
  video-net:
    driver: bridge

volumes:
  minio-data:
    driver: local
